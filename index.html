<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bryan Paget</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: #0c070a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: #e6dfd5;
            line-height: 1.4;
        }

        /* deep, calm gradient background – no noise, no movement */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 10%, #2a1a1a, #080406);
            z-index: -2;
        }

        /* very subtle texture overlay (barely there) */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" opacity="0.03"><path fill="none" d="M0 0 L200 0 M0 50 L200 50 M0 100 L200 100 M0 150 L200 150 M50 0 L50 200 M100 0 L100 200 M150 0 L150 200" stroke="%23b87a50" stroke-width="0.5"/></svg>');
            background-repeat: repeat;
            background-size: 40px 40px;
            pointer-events: none;
            z-index: -1;
        }

        /* main card – clean, spacious, professional */
        .card {
            max-width: 560px;
            width: 100%;
            background: rgba(18, 12, 15, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 32px;
            padding: 2.5rem 2rem;
            box-shadow: 0 25px 40px -20px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(180, 100, 70, 0.15);
            transition: all 0.2s ease;
        }

        /* profile image – refined, not oversize */
        .avatar {
            width: 112px;
            height: 112px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            display: block;
            border: 2px solid rgba(190, 110, 70, 0.3);
            transition: border-color 0.2s;
        }

        .avatar:hover {
            border-color: rgba(190, 110, 70, 0.7);
        }

        /* name – solid color, warm but not shouting */
        h1 {
            font-size: 2.2rem;
            font-weight: 550;
            letter-spacing: -0.3px;
            text-align: center;
            color: #c67f52;
            margin-bottom: 0.75rem;
        }

        /* subtle descriptor (optional, but adds context) */
        .descriptor {
            text-align: center;
            font-size: 0.9rem;
            font-weight: 400;
            color: #b9aa99;
            margin-bottom: 2rem;
            letter-spacing: -0.2px;
        }

        /* link grid – clean, even spacing */
        .links {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
            margin: 1.5rem 0 1rem;
        }

        /* button style – rounded, solid fill with subtle hover */
        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0.9rem 1rem;
            background: rgba(28, 20, 23, 0.8);
            backdrop-filter: blur(4px);
            border-radius: 60px;
            text-decoration: none;
            font-weight: 480;
            font-size: 1rem;
            color: #e2d6ca;
            transition: all 0.2s ease;
            border: none;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .link-btn:hover {
            background: rgba(50, 36, 40, 0.9);
            transform: translateY(-1px);
            color: #f2e2cf;
            box-shadow: 0 8px 18px -6px rgba(0, 0, 0, 0.4);
        }

        /* footer with only blog link */
        .footer {
            margin-top: 2.2rem;
            text-align: center;
            padding-top: 0.8rem;
        }

        .blog-link {
            display: inline-block;
            color: #b87a50;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 460;
            transition: color 0.2s;
            border-bottom: 1px solid rgba(184, 122, 80, 0.4);
            padding-bottom: 2px;
        }

        .blog-link:hover {
            color: #da9a6a;
            border-bottom-color: #da9a6a;
        }

        /* responsive adjustments */
        @media (max-width: 500px) {
            .card {
                padding: 1.8rem 1.4rem;
                border-radius: 28px;
            }
            h1 {
                font-size: 1.9rem;
            }
            .avatar {
                width: 96px;
                height: 96px;
            }
            .link-btn {
                padding: 0.75rem 0.8rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="./img/profile-2024-19.jpg" alt="Bryan Paget" class="avatar" />
        <h1>Bryan Paget</h1>
        <div class="descriptor"></div>
        
        <div class="links">
            <a href="https://github.com/bryanpaget" target="_blank" rel="noopener" class="link-btn">GitHub</a>
            <a href="https://www.linkedin.com/in/bryanpaget/" target="_blank" rel="noopener" class="link-btn">LinkedIn</a>
            <a href="https://www.youtube.com/@bryanpaget" target="_blank" rel="noopener" class="link-btn">YouTube</a>
            <a href="https://www.instagram.com/bryanpaget" target="_blank" rel="noopener" class="link-btn">Instagram</a>
            <a href="https://medium.com/@bryanpaget" target="_blank" rel="noopener" class="link-btn">Medium</a>
            <a href="https://www.xiaohongshu.com/user/profile/64919888000000001c02a065" target="_blank" rel="noopener" class="link-btn">小红书</a>
            <a href="https://pixelfed.social/@bryanpaget" target="_blank" rel="noopener" class="link-btn">Pixelfed</a>
        </div>

        <div class="footer">
            <a href="https://bryanpaget.neocities.org/" class="blog-link">visit the archive →</a>
        </div>
    </div>
</body>
</html>
