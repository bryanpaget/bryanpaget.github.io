<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bryan Paget - Contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Fira Code', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            color: #f5f5f5;
        }

        .container {
            max-width: 480px;
            width: 100%;
            text-align: center;
        }

        .profile-photo {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 1.5rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #f5f5f5;
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .tagline {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.95rem;
            margin-bottom: 2rem;
            font-weight: 400;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .link-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #181818;
            padding: 1rem 1.25rem;
            border-radius: 12px;
            text-decoration: none;
            transition: all 0.2s ease;
            border: 1px solid #292929;
        }

        .link-item:hover {
            background: #292929;
            border-color: #ef4444;
        }

        .link-platform {
            color: #f5f5f5;
            font-weight: 500;
            font-size: 0.95rem;
            align-items: center;
        }

        .link-description {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            font-weight: 400;
        }

        .link-arrow {
            color: rgba(255, 255, 255, 0.4);
            font-size: 1.25rem;
            transition: color 0.2s ease;
        }

        .link-item:hover .link-arrow {
            color: #ef4444;
        }

        .footer {
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #292929;
        }

        .footer p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
        }

        .main-site-link {
            display: inline-block;
            margin-top: 1rem;
            color: #ef4444;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .main-site-link:hover {
            color: #f87171;
        }

        @media (max-width: 480px) {
            body {
                padding: 1.5rem;
            }

            .profile-photo {
                width: 140px;
                height: 140px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .link-item {
                padding: 0.875rem 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="./img/profile-2024-19.jpg" alt="Bryan Paget" class="profile-photo" />

        <h1>Bryan Paget</h1>
        
        <div class="links">
            <a href="https://github.com/bryanpaget" target="_blank" rel="noopener" class="link-item">
                <span class="link-platform">GitHub</span>
            </a>

            <a href="https://www.linkedin.com/in/bryanpaget/" target="_blank" rel="noopener" class="link-item">
                <span class="link-platform">LinkedIn</span>
            </a>

            <a href="https://www.youtube.com/@bryanpaget" target="_blank" rel="noopener" class="link-item">
                <span class="link-platform">YouTube</span>
            </a>

            <a href="https://www.instagram.com/bryanpaget" target="_blank" rel="noopener" class="link-item">
                <span class="link-platform">Instagram</span>
            </a>

            <a href="https://medium.com/@bryanpaget" target="_blank" rel="noopener" class="link-item">
                <span class="link-platform">Medium</span>
            </a>

            <a href="https://www.xiaohongshu.com/user/profile/64919888000000001c02a065" target="_blank" rel="noopener" class="link-item">
                <span class="link-platform">小红书</span>
            </a>

            <a href="https://pixelfed.social/@bryanpaget" target="_blank" rel="noopener" class="link-item">
                <span class="link-platform">Pixelfed</span>
            </a>
        </div>

        <div class="footer">
            <p>Based in Ottawa, Canada</p>
            <a href="https://bryanpaget.neocities.org/" class="main-site-link">Visit my blog &rarr;</a>
        </div>
    </div>
</body>
</html>
