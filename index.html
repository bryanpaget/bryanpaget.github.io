<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bryan Paget</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Muted Elegance Palette – no purple, pure grey/charcoal/silver + gold */
        :root {
            /* Light mode */
            --bg-start: #e2e0e6;
            --bg-end: #cecbd3;
            --card-bg: rgba(255, 255, 255, 0.72);
            --card-border: rgba(109, 106, 117, 0.2);
            --text-primary: #2a2832;
            --text-secondary: #6d6a75;
            --accent: #deb841;
            --accent-hover: #de9e36;
            --link-bg: rgba(55, 50, 62, 0.06);
            --link-bg-hover: rgba(55, 50, 62, 0.12);
            --link-text: #37323e;
            --footer-link: #6d6a75;
            --grid-opacity: 0.12;
        }

        body.dark {
            --bg-start: #1e1c24;
            --bg-end: #121017;
            --card-bg: rgba(28, 26, 33, 0.88);
            --card-border: rgba(191, 189, 193, 0.15);
            --text-primary: #f0ece8;
            --text-secondary: #bfbdc1;
            --accent: #deb841;
            --accent-hover: #de9e36;
            --link-bg: rgba(55, 50, 62, 0.55);
            --link-bg-hover: rgba(55, 50, 62, 0.8);
            --link-text: #eae6e0;
            --footer-link: #bfbdc1;
            --grid-opacity: 0.08;
        }

        body {
            font-family: 'Inter', 'Helvetica Neue', 'SF Pro Text', system-ui, -apple-system, sans-serif;
            background: var(--bg-start);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: var(--text-primary);
            transition: background 0.25s ease, color 0.2s ease;
        }

        /* gradient background – pure grey scale */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 30% 20%, var(--bg-end), var(--bg-start));
            z-index: -2;
            transition: background 0.25s ease;
        }

        /* very subtle geometric grid – neutral */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" opacity="0.4"><path fill="none" d="M0 0 L200 0 M0 50 L200 50 M0 100 L200 100 M0 150 L200 150 M50 0 L50 200 M100 0 L100 200 M150 0 L150 200" stroke="%236d6a75" stroke-width="0.4"/></svg>');
            background-repeat: repeat;
            background-size: 48px 48px;
            pointer-events: none;
            z-index: -1;
            opacity: var(--grid-opacity);
            transition: opacity 0.2s ease;
        }

        /* main card */
        .card {
            max-width: 540px;
            width: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(18px);
            border-radius: 32px;
            padding: 2.4rem 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.2), 0 0 0 1px var(--card-border);
            transition: all 0.3s ease;
        }

        /* theme toggle – minimal, gold accent */
        .theme-toggle {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 1.2rem;
        }
        .toggle-btn {
            background: var(--link-bg);
            border: none;
            border-radius: 40px;
            padding: 0.4rem 0.9rem;
            font-size: 0.78rem;
            font-weight: 480;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.45rem;
            transition: all 0.2s ease;
            backdrop-filter: blur(4px);
            font-family: inherit;
        }
        .toggle-btn:hover {
            background: var(--link-bg-hover);
            color: var(--accent);
        }
        .toggle-icon {
            font-size: 0.9rem;
        }

        /* avatar – refined */
        .avatar {
            width: 112px;
            height: 112px;
            margin: 0 auto 1.5rem;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 10px 22px -8px rgba(0, 0, 0, 0.2);
            display: block;
            border: 2px solid var(--accent);
            transition: border-color 0.2s;
        }
        .avatar:hover {
            border-color: var(--accent-hover);
        }

        /* name – only, no subtitle */
        h1 {
            font-size: 2.3rem;
            font-weight: 560;
            letter-spacing: -0.3px;
            text-align: center;
            color: var(--text-primary);
            margin-bottom: 1.8rem;
        }

        /* link buttons – no arrows, clean */
        .links {
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
            margin: 0.5rem 0 1rem;
        }
        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0.9rem 1rem;
            background: var(--link-bg);
            backdrop-filter: blur(4px);
            border-radius: 60px;
            text-decoration: none;
            font-weight: 480;
            font-size: 0.98rem;
            color: var(--link-text);
            transition: all 0.2s ease;
            border: none;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }
        .link-btn:hover {
            background: var(--link-bg-hover);
            transform: translateY(-1px);
            color: var(--accent);
            box-shadow: 0 8px 18px -8px rgba(0, 0, 0, 0.15);
        }

        /* footer – only blog link, no arrow (just text) */
        .footer {
            margin-top: 2rem;
            text-align: center;
        }
        .blog-link {
            display: inline-block;
            color: var(--footer-link);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 440;
            transition: color 0.2s;
            border-bottom: 1px solid transparent;
        }
        .blog-link:hover {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* responsive */
        @media (max-width: 500px) {
            .card {
                padding: 1.6rem 1.4rem;
                border-radius: 28px;
            }
            h1 {
                font-size: 1.9rem;
                margin-bottom: 1.4rem;
            }
            .avatar {
                width: 96px;
                height: 96px;
            }
            .link-btn {
                padding: 0.7rem 0.8rem;
                font-size: 0.88rem;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="theme-toggle">
            <button id="darkModeToggle" class="toggle-btn" aria-label="Switch theme">
                <span class="toggle-icon">🌙</span>
                <span>Dark / Light</span>
            </button>
        </div>
        <img src="./img/profile-2024-19.jpg" alt="Bryan Paget" class="avatar" />
        <h1>Bryan Paget</h1>
        
        <div class="links">
            <a href="https://github.com/bryanpaget" target="_blank" rel="noopener" class="link-btn">GitHub</a>
            <a href="https://www.linkedin.com/in/bryanpaget/" target="_blank" rel="noopener" class="link-btn">LinkedIn</a>
            <a href="https://www.youtube.com/@bryanpaget" target="_blank" rel="noopener" class="link-btn">YouTube</a>
            <a href="https://www.instagram.com/bryanpaget" target="_blank" rel="noopener" class="link-btn">Instagram</a>
            <a href="https://medium.com/@bryanpaget" target="_blank" rel="noopener" class="link-btn">Medium</a>
            <a href="https://www.xiaohongshu.com/user/profile/64919888000000001c02a065" target="_blank" rel="noopener" class="link-btn">小红书</a>
            <a href="https://pixelfed.social/@bryanpaget" target="_blank" rel="noopener" class="link-btn">Pixelfed</a>
        </div>

        <div class="footer">
            <a href="https://bryanpaget.neocities.org/" class="blog-link">visit the archive →</a>
        </div>
    </div>

    <script>
        (function() {
            const toggleBtn = document.getElementById('darkModeToggle');
            // Check system preference and stored preference
            const stored = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            
            if (stored === 'dark' || (stored === null && prefersDark)) {
                document.body.classList.add('dark');
            } else if (stored === 'light') {
                document.body.classList.remove('dark');
            }
            
            function toggleTheme() {
                if (document.body.classList.contains('dark')) {
                    document.body.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                } else {
                    document.body.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                }
            }
            
            toggleBtn.addEventListener('click', toggleTheme);
        })();
    </script>
</body>
</html>
